<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Nano · Chat Local</title>
  <style>
    /* ─── Design Tokens ──────────────────────────────────────────────────── */
    :root {
      --color-bg:              #0d0d0d;
      --color-surface:         #141414;
      --color-surface-2:       #1a1a1a;
      --color-surface-3:       #222222;
      --color-border:          #2b2b2b;
      --color-text:            #e6e6e4;
      --color-text-muted:      #888886;
      --color-text-faint:      #3e3e3c;
      --color-primary:         #4f9fa8;
      --color-primary-hover:   #3d8a93;
      --color-primary-dim:     rgba(79,159,168,0.12);
      --color-primary-ring:    rgba(79,159,168,0.20);
      --color-user-bubble:     #2a5c62;
      --color-user-bubble-txt: #e4f4f5;

      --status-error:          #c94040;
      --status-error-bg:       rgba(201,64,64,0.10);
      --status-error-border:   rgba(201,64,64,0.22);
      --status-warn:           #c49a2a;
      --status-warn-bg:        rgba(196,154,42,0.10);
      --status-warn-border:    rgba(196,154,42,0.22);
      --status-ok:             #4aaa5c;
      --status-ok-bg:          rgba(74,170,92,0.10);
      --status-ok-border:      rgba(74,170,92,0.22);

      --font-body: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;

      --radius-sm:   6px;
      --radius-md:   10px;
      --radius-lg:   14px;
      --radius-xl:   18px;
      --radius-pill: 9999px;

      --sp-1:  4px;  --sp-2:  8px;  --sp-3:  12px; --sp-4:  16px;
      --sp-5:  20px; --sp-6:  24px; --sp-8:  32px; --sp-10: 40px;

      --text-xs:   clamp(0.75rem,  0.70rem + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.82rem + 0.28vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --dur: 180ms;
    }

    /* ─── Base Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      height: 100%; display: flex; flex-direction: column; overflow: hidden;
      font-family: var(--font-body); font-size: var(--text-base);
      color: var(--color-text); background: var(--color-bg);
    }
    button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
    textarea { font: inherit; color: inherit; }
    svg { display: block; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border-width: 0;
    }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px; border-radius: var(--radius-sm);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--sp-3); padding: var(--sp-3) var(--sp-5);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0; z-index: 10;
    }
    .app-logo {
      display: flex; align-items: center; gap: var(--sp-2);
      font-size: var(--text-sm); font-weight: 600;
      letter-spacing: -0.02em; user-select: none;
    }
    .app-logo-sub { font-weight: 400; color: var(--color-text-muted); }

    /* ─── Status Badge ───────────────────────────────────────────────────── */
    .status-badge {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      padding: 5px var(--sp-3); border-radius: var(--radius-pill);
      border: 1px solid transparent; font-size: var(--text-xs);
      font-weight: 500; white-space: nowrap;
      transition: background var(--dur) var(--ease-out),
                  color var(--dur) var(--ease-out),
                  border-color var(--dur) var(--ease-out);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      transition: background var(--dur) var(--ease-out),
                  box-shadow var(--dur) var(--ease-out);
    }
    .status-badge.s-init,
    .status-badge.s-error {
      background: var(--status-error-bg); color: var(--status-error);
      border-color: var(--status-error-border);
    }
    .status-badge.s-init .status-dot,
    .status-badge.s-error .status-dot { background: var(--status-error); }

    .status-badge.s-downloading {
      background: var(--status-warn-bg); color: var(--status-warn);
      border-color: var(--status-warn-border);
    }
    .status-badge.s-downloading .status-dot {
      background: var(--status-warn);
      animation: dot-pulse 1.3s ease-in-out infinite;
    }
    .status-badge.s-ready {
      background: var(--status-ok-bg); color: var(--status-ok);
      border-color: var(--status-ok-border);
    }
    .status-badge.s-ready .status-dot {
      background: var(--status-ok);
      box-shadow: 0 0 7px rgba(74,170,92,0.6);
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(0.75); }
    }

    /* ─── Messages Area ──────────────────────────────────────────────────── */
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages {
      flex: 1; overflow-y: auto; padding: var(--sp-5);
      display: flex; flex-direction: column; gap: var(--sp-4);
      scroll-behavior: smooth;
      scrollbar-width: thin; scrollbar-color: var(--color-border) transparent;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--color-border); border-radius: var(--radius-pill);
    }

    /* ─── Welcome Screen ─────────────────────────────────────────────────── */
    .welcome-state {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: var(--sp-10) var(--sp-6);
      gap: var(--sp-4); color: var(--color-text-muted);
      animation: msg-in 360ms var(--ease-out) both;
    }
    .welcome-icon {
      width: 52px; height: 52px;
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-primary);
    }
    .welcome-state h2 {
      font-size: var(--text-base); font-weight: 600;
      color: var(--color-text); letter-spacing: -0.01em;
    }
    .welcome-state p {
      font-size: var(--text-sm); max-width: 34ch; line-height: 1.65;
    }

    /* ─── Message Bubbles ────────────────────────────────────────────────── */
    .message {
      display: flex; align-items: flex-start; gap: var(--sp-3);
      max-width: 84%;
      animation: msg-in 220ms var(--ease-out) both;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.msg-user { align-self: flex-end; flex-direction: row-reverse; }
    .message.msg-ai   { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: var(--radius-pill);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; letter-spacing: 0.02em; margin-top: 2px;
    }
    .msg-user .msg-avatar {
      background: var(--color-primary-dim); color: var(--color-primary);
      border: 1px solid var(--color-primary-ring);
    }
    .msg-ai .msg-avatar {
      background: var(--color-surface-3); color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }
    .msg-bubble {
      padding: var(--sp-3) var(--sp-4); font-size: var(--text-sm);
      line-height: 1.68; word-break: break-word; white-space: pre-wrap;
    }
    .msg-user .msg-bubble {
      background: var(--color-user-bubble); color: var(--color-user-bubble-txt);
      border-radius: var(--radius-lg) var(--radius-sm) var(--radius-lg) var(--radius-lg);
    }
    .msg-ai .msg-bubble {
      background: var(--color-surface-2); color: var(--color-text);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
    }
    .msg-ai .msg-bubble.streaming { opacity: 0.88; }
    .msg-ai .msg-bubble.streaming::after {
      content: '▋'; display: inline-block; margin-left: 2px;
      animation: cursor-blink 0.9s step-end infinite;
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0; }
    }

    /* ─── Typing Indicator ───────────────────────────────────────────────── */
    .typing-indicator {
      display: flex; gap: 5px; align-items: center;
      padding: var(--sp-3) var(--sp-4);
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
      width: fit-content;
    }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--color-text-muted);
      animation: typing-bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0);   opacity: 0.45; }
      30%            { transform: translateY(-5px); opacity: 1;    }
    }

    /* ─── Error Banner ───────────────────────────────────────────────────── */
    .error-banner {
      display: none; margin: var(--sp-4); padding: var(--sp-4) var(--sp-5);
      background: var(--status-error-bg); border: 1px solid var(--status-error-border);
      border-radius: var(--radius-lg); color: var(--status-error);
      font-size: var(--text-sm); line-height: 1.65;
      animation: msg-in 280ms var(--ease-out) both;
    }
    .error-banner.visible { display: block; }
    .error-banner strong {
      display: block; font-weight: 600;
      margin-bottom: var(--sp-1); font-size: var(--text-sm);
    }
    .error-banner .error-hint {
      margin-top: var(--sp-3); padding-top: var(--sp-3);
      border-top: 1px solid var(--status-error-border);
      font-size: var(--text-xs); color: rgba(201,64,64,0.75); line-height: 1.7;
    }

    /* ─── Input Area ─────────────────────────────────────────────────────── */
    .input-footer {
      flex-shrink: 0; padding: var(--sp-3) var(--sp-4) var(--sp-4);
      background: var(--color-surface); border-top: 1px solid var(--color-border);
    }
    .input-wrap {
      display: flex; gap: var(--sp-2); align-items: flex-end;
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--sp-2) var(--sp-2) var(--sp-2) var(--sp-4);
      transition: border-color var(--dur) var(--ease-out),
                  box-shadow var(--dur) var(--ease-out);
    }
    .input-wrap:focus-within {
      border-color: rgba(79,159,168,0.40);
      box-shadow: 0 0 0 3px var(--color-primary-dim);
    }
    #user-input {
      flex: 1; background: none; border: none; outline: none;
      resize: none; font-size: var(--text-sm); line-height: 1.6;
      max-height: 136px; overflow-y: auto; padding: var(--sp-2) 0;
      scrollbar-width: thin; scrollbar-color: var(--color-border) transparent;
    }
    #user-input::placeholder { color: var(--color-text-faint); }
    #user-input:disabled      { cursor: not-allowed; opacity: 0.45; }

    .send-btn {
      flex-shrink: 0; width: 36px; height: 36px;
      background: var(--color-primary); color: #fff;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--dur) var(--ease-out),
                  transform   var(--dur) var(--ease-out),
                  opacity     var(--dur) var(--ease-out);
    }
    .send-btn:hover:not(:disabled)  { background: var(--color-primary-hover); }
    .send-btn:active:not(:disabled) { transform: scale(0.91); }
    .send-btn:disabled { opacity: 0.28; cursor: not-allowed; }

    .input-hint {
      margin-top: var(--sp-2); font-size: var(--text-xs);
      color: var(--color-text-faint); text-align: center;
      transition: color var(--dur) var(--ease-out);
    }

    /* ─── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 580px) {
      .app-header  { padding: var(--sp-2) var(--sp-3); }
      .messages    { padding: var(--sp-3); gap: var(--sp-3); }
      .message     { max-width: 92%; }
      .input-footer { padding: var(--sp-2) var(--sp-3) var(--sp-3); }
    }
  </style>
</head>
<body>

<header class="app-header" role="banner">
  <div class="app-logo" aria-label="Gemini Nano Chat Local">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
      <path d="M11 1.5 L3 5.5 V10.5 C3 15.2 6.6 19.6 11 20.5 C15.4 19.6 19 15.2 19 10.5 V5.5 Z"
            stroke="#4f9fa8" stroke-width="1.4" stroke-linejoin="round" fill="rgba(79,159,168,0.08)"/>
      <path d="M7.5 11 L9.8 13.5 L14.5 8.5"
            stroke="#4f9fa8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Gemini Nano <span class="app-logo-sub">/ local</span></span>
  </div>

  <div class="status-badge s-init"
       id="status-badge"
       role="status"
       aria-live="polite"
       aria-atomic="true">
    <span class="status-dot" aria-hidden="true"></span>
    <span id="status-text">Verificando API…</span>
  </div>
</header>

<main class="chat-main" role="main">

  <div class="messages"
       id="messages"
       role="log"
       aria-live="polite"
       aria-label="Histórico de mensagens">

    <div class="welcome-state" id="welcome-state">
      <div class="welcome-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 22 22" fill="none">
          <path d="M11 1.5 L3 5.5 V10.5 C3 15.2 6.6 19.6 11 20.5 C15.4 19.6 19 15.2 19 10.5 V5.5 Z"
                stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"
                fill="currentColor" fill-opacity="0.08"/>
          <path d="M7.5 11 L9.8 13.5 L14.5 8.5"
                stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Chat com Gemini Nano</h2>
      <p id="welcome-sub">Processamento 100% local, sem internet.<br>Aguardando o modelo…</p>
    </div>

  </div>

  <div class="error-banner"
       id="error-banner"
       role="alert"
       aria-live="assertive">
    <strong id="error-title">API indisponível</strong>
    <span  id="error-detail"></span>
    <div class="error-hint" id="error-hint"></div>
  </div>

</main>

<footer class="input-footer">
  <form class="input-wrap" id="chat-form" aria-label="Enviar mensagem">
    <label for="user-input" class="sr-only">Sua mensagem</label>
    <textarea
      id="user-input"
      placeholder="Escreva uma mensagem…"
      rows="1"
      disabled
      autocomplete="off"
      spellcheck="true"
      aria-multiline="true"
    ></textarea>
    <button
      type="submit"
      class="send-btn"
      id="send-btn"
      disabled
      aria-label="Enviar mensagem"
    >
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M22 2 L11 13" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2 L15 22 L11 13 L2 9 Z" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </form>
  <p class="input-hint" id="input-hint">Enter para enviar · Shift+Enter para nova linha</p>
</footer>

<script>
(function () {
  'use strict';

  /* ── DOM references ────────────────────────────────────────────────────── */
  const statusBadge  = document.getElementById('status-badge');
  const statusText   = document.getElementById('status-text');
  const messagesEl   = document.getElementById('messages');
  const welcomeState = document.getElementById('welcome-state');
  const welcomeSub   = document.getElementById('welcome-sub');
  const errorBanner  = document.getElementById('error-banner');
  const errorTitle   = document.getElementById('error-title');
  const errorDetail  = document.getElementById('error-detail');
  const errorHint    = document.getElementById('error-hint');
  const chatForm     = document.getElementById('chat-form');
  const userInput    = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const inputHint    = document.getElementById('input-hint');

  /* ── App state ─────────────────────────────────────────────────────────── */
  let aiSession    = null;
  let isProcessing = false;

  /* ──────────────────────────────────────────────────────────────────────────
   * getAIModelAPI()
   * Resolve a API nativa LanguageModel do Chrome a partir de múltiplos
   * namespaces possíveis, cobrindo a Origin Trial (self.ai.*) e a versão
   * standalone do Prompt API (global LanguageModel).
   * Nunca acessa window.* — usa self e avaliação indireta via Function().
   * ──────────────────────────────────────────────────────────────────────── */
  function getAIModelAPI() {
    /* Spec v2: LanguageModel como global direto (Chrome 126+ Canary) */
    if (typeof LanguageModel !== 'undefined' && LanguageModel) {
      return LanguageModel;
    }
    /* Spec v1a: self.ai.languageModel (Origin Trial) */
    if (typeof self !== 'undefined' && self.ai && self.ai.languageModel) {
      return self.ai.languageModel;
    }
    /* Spec v1b: global `ai` em alguns builds — avaliação indireta */
    try {
      const root = Function('return typeof ai !== "undefined" ? ai : null')();
      if (root && root.languageModel) return root.languageModel;
    } catch (_) { /* swallow ReferenceError */ }
    return null;
  }

  /* ── Status UI ─────────────────────────────────────────────────────────── */
  function setStatus(state, label) {
    statusBadge.className = 'status-badge s-' + state;
    statusText.textContent = label;
  }

  /* ── Error display ─────────────────────────────────────────────────────── */
  function showError(title, detail, hint) {
    setStatus('error', 'Indisponível');
    errorTitle.textContent  = title;
    errorDetail.textContent = detail;
    errorHint.textContent   = hint || '';
    errorBanner.classList.add('visible');
    blockInput('Chat desabilitado — veja o erro acima.');
  }

  /* ── Input lifecycle ───────────────────────────────────────────────────── */
  function blockInput(hint) {
    isProcessing = true;
    userInput.disabled = true;
    sendBtn.disabled   = true;
    if (hint) inputHint.textContent = hint;
  }

  function releaseInput() {
    isProcessing = false;
    userInput.disabled = false;
    sendBtn.disabled   = userInput.value.trim().length === 0;
    inputHint.textContent = 'Enter para enviar · Shift+Enter para nova linha';
  }

  /* ── Auto-grow textarea ────────────────────────────────────────────────── */
  function resizeInput() {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 136) + 'px';
  }

  /* ── Helpers ───────────────────────────────────────────────────────────── */
  function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function clearWelcome() {
    if (welcomeState && welcomeState.parentNode) welcomeState.remove();
  }

  /* ── Append message bubble ─────────────────────────────────────────────── */
  function appendMessage(role, text) {
    clearWelcome();
    const wrapper = document.createElement('div');
    wrapper.className = 'message msg-' + role;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.setAttribute('aria-hidden', 'true');
    avatar.textContent = role === 'user' ? 'EU' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (text) bubble.textContent = text;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollDown();
    return bubble;
  }

  /* ── Typing indicator ──────────────────────────────────────────────────── */
  function showTyping() {
    clearWelcome();
    const wrapper = document.createElement('div');
    wrapper.className = 'message msg-ai';
    wrapper.id = 'typing-row';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.setAttribute('aria-hidden', 'true');
    avatar.textContent = 'AI';

    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    ind.setAttribute('aria-label', 'IA processando…');
    for (let i = 0; i < 3; i++) {
      const d = document.createElement('span');
      d.className = 'typing-dot';
      d.setAttribute('aria-hidden', 'true');
      ind.appendChild(d);
    }
    wrapper.appendChild(avatar);
    wrapper.appendChild(ind);
    messagesEl.appendChild(wrapper);
    scrollDown();
  }

  function removeTyping() {
    const row = document.getElementById('typing-row');
    if (row) row.remove();
  }

  /* ── Send message ──────────────────────────────────────────────────────── */
  async function handleSend(evt) {
    if (evt) evt.preventDefault();
    const text = userInput.value.trim();
    if (!text || isProcessing || !aiSession) return;

    blockInput();
    userInput.value = '';
    resizeInput();
    appendMessage('user', text);
    showTyping();

    try {
      if (typeof aiSession.promptStreaming === 'function') {
        /* Streaming — Chrome retorna texto cumulativo em cada chunk */
        const stream = aiSession.promptStreaming(text);
        removeTyping();
        const bubble = appendMessage('ai', '');
        bubble.classList.add('streaming');
        let accumulated = '';
        for await (const chunk of stream) {
          accumulated = typeof chunk === 'string' ? chunk : accumulated;
          bubble.textContent += accumulated;
          scrollDown();
        }
        bubble.classList.remove('streaming');
      } else {
        /* Fallback bloqueante */
        const response = await aiSession.prompt(text);
        removeTyping();
        appendMessage('ai', response || '(resposta vazia)');
      }
    } catch (err) {
      removeTyping();
      appendMessage('ai', '⚠ Erro ao processar: ' + (err.message || String(err)));
      console.error('[Gemini Nano] prompt error:', err);
    }

    releaseInput();
    userInput.focus();
  }

  /* ── Model init ────────────────────────────────────────────────────────── */
  async function initModel() {
    setStatus('init', 'Verificando API…');
    const api = getAIModelAPI();

    if (!api) {
      showError(
        'API LanguageModel não encontrada',
        'Nenhum objeto LanguageModel foi detectado neste navegador.',
        'Pré-requisitos: Google Chrome Canary (126+) com as flags ' +
        '"Prompt API for Gemini Nano" e "Enables optimization guide on device" ' +
        'ativas em chrome://flags. O modelo deve estar baixado em chrome://components ' +
        '(Optimization Guide On Device Model).'
      );
      return;
    }

    try {
      /* Detectar método de checagem de disponibilidade entre spec v1 e v2 */
      let availability = 'readily';

      if (typeof api.availability === 'function') {
        availability = await api.availability();               /* spec v2 */
      } else if (typeof api.capabilities === 'function') {
        const caps = await api.capabilities();
        availability = (caps && caps.available) ? caps.available : 'readily'; /* spec v1 */
      }

      if (availability === 'no' || availability === 'unavailable') {
        showError(
          'Modelo indisponível neste dispositivo',
          'O Gemini Nano reportou "unavailable". O dispositivo pode não atender ' +
          'os requisitos mínimos (GPU dedicada, ~22 GB de RAM, ~5 GB livres em disco).',
          'Verifique o status em chrome://components → ' +
          '"Optimization Guide On Device Model".'
        );
        return;
      }

      if (availability === 'after-download' || availability === 'downloading') {
        setStatus('downloading', 'Aguardando download…');
        aiSession = await api.create({
          monitor(m) {
            if (!m || typeof m.addEventListener !== 'function') return;
            m.addEventListener('downloadprogress', (ev) => {
              const pct = (ev.total > 0)
                ? Math.round((ev.loaded / ev.total) * 100)
                : null;
              setStatus('downloading', pct !== null ? `Baixando… ${pct}%` : 'Baixando modelo…');
            });
          }
        });
      } else {
        aiSession = await api.create();
      }

      setStatus('ready', 'Modelo conectado');
      if (welcomeSub) welcomeSub.textContent = 'Modelo pronto. Processamento 100% local.';
      releaseInput();
      userInput.focus();

    } catch (err) {
      console.error('[Gemini Nano] init error:', err);
      showError(
        'Falha na inicialização',
        err.message || 'Erro desconhecido ao criar a sessão do modelo.',
        'Verifique o console do DevTools (F12) para o stack trace completo.'
      );
    }
  }

  /* ── Event listeners ───────────────────────────────────────────────────── */
  chatForm.addEventListener('submit', handleSend);

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) handleSend(null);
    }
  });

  userInput.addEventListener('input', () => {
    resizeInput();
    if (!isProcessing) sendBtn.disabled = userInput.value.trim().length === 0;
  });

  /* ── Bootstrap ─────────────────────────────────────────────────────────── */
  initModel();

})();
</script>
