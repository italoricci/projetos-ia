<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAI Chat Interativo</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            max-width: 900px; margin: 0 auto; padding: 20px; background: #f0f2f5; 
            display: flex; flex-direction: column; height: 100vh;
        }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 10px; }
        #chat-container { 
            flex: 1; background: white; border-radius: 12px; padding: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow-y: auto; margin-bottom: 20px;
            max-height: 70vh;
        }
        .message { margin-bottom: 16px; display: flex; }
        .user { justify-content: flex-end; }
        .user .bubble { background: #1a73e8; color: white; border-radius: 18px 18px 4px 18px; }
        .assistant { justify-content: flex-start; }
        .assistant .bubble { background: #f8f9fa; color: #333; border-radius: 18px 18px 18px 4px; border-left: 4px solid #1a73e8; }
        .bubble { padding: 12px 16px; max-width: 80%; word-wrap: break-word; line-height: 1.5; }
        .loading { display: inline-block; }
        .spinner { 
            width: 20px; height: 20px; border: 2px solid #e0e0e0; border-top: 2px solid #1a73e8; 
            border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #input-form { display: flex; gap: 10px; }
        #question { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 24px; font-size: 16px; resize: none; height: 50px; }
        #ask-button { 
            padding: 12px 24px; background: #1a73e8; color: white; border: none; border-radius: 24px; 
            cursor: pointer; font-weight: bold; white-space: nowrap;
        }
        #ask-button:disabled, #question:disabled { opacity: 0.6; cursor: not-allowed; }
        #ask-button:hover:not(:disabled) { background: #1557b0; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .loading-overlay.active { display: flex; }
        .loading-text { color: white; font-size: 18px; }
    </style>
</head>
<body>
    <h1>🤖 WebAI Chat Interativo</h1>
    
    <div id="chat-container">
        <div class="message assistant">
            <div class="bubble">Olá! Sou um assistente de IA. Digite sua pergunta abaixo e eu responderei! 😊</div>
        </div>
    </div>

    <form id="input-form">
        <textarea id="question" placeholder="Digite sua pergunta aqui..." required></textarea>
        <button type="submit" id="ask-button">Enviar</button>
    </form>

    <div id="loading-overlay" class="loading-overlay">
        <div>
            <div class="spinner"></div>
            <span class="loading-text">Gerando resposta... Aguarde</span>
        </div>
    </div>

    <!-- Markdown renderer -->
    <script src="https://cdn.jsdelivr.net/npm/markdown@0.5.0/lib/markdown.min.js"></script>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const questionInput = document.getElementById('question');
        const askButton = document.getElementById('ask-button');
        const form = document.getElementById('input-form');
        const loadingOverlay = document.getElementById('loading-overlay');

        let session = null;
        let messages = [
            {
                role: 'system',
                content: 'Você é um assistente de IA que responde de forma clara, objetiva e útil em português.'
            }
        ];

        // Função para adicionar mensagem ao chat
        function addMessage(role, content, isLoading = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (isLoading) {
                bubble.innerHTML = '<span class="spinner"></span>Gerando...';
            } else {
                bubble.innerHTML = markdown.toHTML(content);
            }
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return bubble;
        }

        // Inicializar modelo
        async function initModel() {
            const params = await LanguageModel.params();
            console.log('Params:', params);
            const temperature = params.defaultTemperature;
            const topK = params.defaultTopK;

            session = await LanguageModel.create({
                expectedInputLanguages: ['pt'],
                temperature,
                topK,
                initialPrompts: [messages[0]]  // System prompt
            });
            console.log('Modelo inicializado');
        }

        // Submit handler
        async function handleSubmit(e) {
            e.preventDefault();
            const userQuestion = questionInput.value.trim();
            if (!userQuestion || !session) return;

            // Add user message
            addMessage('user', userQuestion);
            questionInput.value = '';

            // Prepare assistant loading
            const assistantBubble = addMessage('assistant', '', true);

            // Disable input
            questionInput.disabled = true;
            askButton.disabled = true;
            loadingOverlay.classList.add('active');
            document.body.style.cursor = 'wait';

            try {
                // Add to history
                messages.push({ role: 'user', content: userQuestion });

                // Stream response
                const responseStream = await session.promptStreaming(messages.slice(1));  // Skip system
                let fullText = '';
                for await (const token of responseStream) {
                    fullText += token; // é gerado token a token
                    assistantBubble.innerHTML = markdown.toHTML(fullText);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                // Add to history
                messages.push({ role: 'assistant', content: fullText });

            } catch (error) {
                console.error('Erro:', error);
                assistantBubble.innerHTML = `<span style="color: red;">Erro: ${error.message}</span>`;
            } finally {
                // Re-enable
                questionInput.disabled = false;
                askButton.disabled = false;
                loadingOverlay.classList.remove('active');
                document.body.style.cursor = 'default';
            }
        }

        // Init
        (async () => {
            await initModel();
        })();

        // Events
        form.addEventListener('submit', handleSubmit);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSubmit(e);
            }
        });
    </script>
</body>
</html>
